[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
]
ignore = [
    "E501",   # line too long (let black handle this)
    "B008",   # do not perform function in argument defaults
    "C901",   # too complex (let complexity metrics handle this)
]

[lint.per-file-ignores]
"tests/*" = ["E501", "B011"]
"__init__.py" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[lint.isort]
known-first-party = ["app"]
known-local-folder = ["app"]